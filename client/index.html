<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/website-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E11D48" />
    <meta
      name="description"
      content="AzCuts — Sharp looks, effortless booking. Book a haircut or salon service, pick your barber, and get a receipt in minutes."
    />
    <title>AzCuts — Barber Shop &amp; Salon</title>

    <!-- Oswald (landing headlines) + Fraunces (dashboard serif headings). Inter is self-hosted. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Oswald:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!--
      No-flash theme bootstrap (external so it satisfies a strict CSP script-src).
      Runs before paint to set the theme on <html> before React mounts.
    -->
    <script src="/theme-init.js"></script>
  </head>
  <body class="h-full">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
